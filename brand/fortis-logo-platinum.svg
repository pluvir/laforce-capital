<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="Fortis Wealth Management">
  <title>Fortis Wealth Management — Platinum Tone</title>

  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&amp;family=Inter:wght@500&amp;display=swap');</style>
    <radialGradient id="bgGlowP" cx="25%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C8CCD1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C8CCD1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="platinum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EBEF"/>
      <stop offset="55%" stop-color="#C8CCD1"/>
      <stop offset="100%" stop-color="#8A8F96"/>
    </linearGradient>
    <linearGradient id="platinumType" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EBEF"/>
      <stop offset="100%" stop-color="#9DA2A9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="#0A0A0C"/>
  <rect width="900" height="240" fill="url(#bgGlowP)"/>

  <g transform="translate(0,0)">
    <path d="M120 24 L216 120 L120 216 L24 120 Z"
