<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Fortis Wealth Management icon">
  <title>Fortis — Mark (Dark)</title>
  <rect width="240" height="240" fill="#0A0A0C"/>

  <!-- subtle radial vignette -->
  <defs>
    <radialGradient id="fortisGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fortisMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CC7A"/>
      <stop offset="55%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9C7F36"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" fill="url(#fortisGlow)"/>

  <!-- Outer diamond frame -->
  <path d="M120 24 L216 120 L120 216 L24 120 Z"
        fill="none" stroke="url(#fortisMetal)" stroke-width="2.4" stroke-linejoin="miter"/>

  <!-- Inner diamond line — depth, institutional double frame -->
  <path d="M120 44 L196 120 L120 196 L44 120 Z"
        fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linejoin="miter" opacity="0.38"/>

  <!-- Abstract F monogram: strong vertical spine + two horizontals -->
  <g fill="url(#fortisMetal)">
    <!-- vertical stem (trunk — subtle palm geometry via proportion) -->
    <rect x="88" y="76" width="13" height="90"/>
    <!-- top bar -->
    <rect x="88" y="76" width="62" height="13"/>
    <!-- middle bar -->
    <rect x="88" y="116" width="44" height="11"/>
  </g>

  <!-- Micro corner accents: tiny inward ticks at top & bottom vertices -->
  <g stroke="#C9A84C" stroke-width="1.1" opacity="0.55">
    <line x1="120" y1="30" x2="120" y2="40"/>
    <line x1="120" y1="200" x2="120" y2="210"/>
  </g>
</svg>
