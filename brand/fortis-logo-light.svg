<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="Fortis Wealth Management">
  <title>Fortis Wealth Management — Light</title>

  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&amp;family=Inter:wght@500&amp;display=swap');</style>
    <linearGradient id="inkL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1A22"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="#F5F2EA"/>

  <!-- === MARK === -->
  <g transform="translate(0,0)">
    <path d="M120 24 L216 120 L120 216 L24 120 Z"
          fill="none" stroke="url(#inkL)" stroke-width="2.4" stroke-linejoin="miter"/>
    <path d="M120 44 L196 120 L120 196 L44 120 Z"
          fill="none" stroke="#0A0A0C" stroke-width="0.9" stroke-linejoin="miter" opacity="0.35"/>
    <g fill="url(#inkL)">
      <rect x="88" y="76" width="13" height="90"/>
      <rect x="88" y="76" width="62" height="13"/>
      <rect x="88" y="116" width="44" height="11"/>
    </g>
    <g stroke="#0A0A0C" stroke-width="1.1" opacity="0.55">
      <line x1="120" y1="30" x2="120" y2="40"/>
      <line x1="120" y1="200" x2="120" y2="210"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="268" y1="62" x2="268" y2="178"
        stroke="#0A0A0C" stroke-width="1" opacity="0.30"/>

  <!-- === WORDMARK === -->
  <g>
    <text x="296" y="140"
          font-family="'Cormorant Garamond','Playfair Display','Didot',Georgia,serif"
          font-weight="500" font-size="98"
          letter-spacing="8"
          fill="url(#inkL)">FORTIS</text>

    <line x1="298" y1="162" x2="360" y2="162"
          stroke="#0A0A0C" stroke-width="1" opacity="0.55"/>

    <text x="372" y="168"
          font-family="'Inter','DM Sans','Helvetica Neue',system-ui,sans-serif"
          font-weight="500" font-size="15"
          letter-spacing="6.2"
          fill="#2A2630">WEALTH MANAGEMENT</text>
  </g>
