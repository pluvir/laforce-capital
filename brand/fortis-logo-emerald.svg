<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" role="img" aria-label="Fortis Wealth Management">
  <title>Fortis Wealth Management — Emerald Accent</title>

  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&amp;family=Inter:wght@500&amp;display=swap');</style>
    <radialGradient id="bgGlowE" cx="25%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metalE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CC7A"/>
      <stop offset="55%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9C7F36"/>
    </linearGradient>
    <linearGradient id="metalTypeE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CC7A"/>
      <stop offset="100%" stop-color="#B89338"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A8A6E"/>
      <stop offset="100%" stop-color="#15513F"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="#0A0A0C"/>
  <rect width="900" height="240" fill="url(#bgGlowE)"/>

  <g transform="translate(0,0)">
    <path d="M120 24 L216 120 L120 216 L24 120 Z"
          fill="none" stroke="url(#metalE)" stroke-width="2.4" stroke-linejoin="miter"/>
    <path d="M120 44 L196 120 L120 196 L44 120 Z"
          fill="none" stroke="#C9A84C" stroke-width="0.9" stroke-linejoin="miter" opacity="0.38"/>
    <g fill="url(#metalE)">
      <rect x="88" y="76" width="13" height="90"/>
      <rect x="88" y="76" width="62" height="13"/>
    </g>
    <!-- Emerald accent: middle bar -->
    <rect x="88" y="116" width="44" height="11" fill="url(#emerald)"/>
    <g stroke="#C9A84C" stroke-width="1.1" opacity="0.55">
      <line x1="120" y1="30" x2="120" y2="40"/>
      <line x1="120" y1="200" x2="120" y2="210"/>
    </g>
  </g>

  <line x1="268" y1="62" x2="268" y2="178"
        stroke="#1E6A53" stroke-width="1" opacity="0.75"/>

  <g>
    <text x="296" y="140"
          font-family="'Cormorant Garamond','Playfair Display','Didot',Georgia,serif"
          font-weight="500" font-size="98"
          letter-spacing="8"
          fill="url(#metalTypeE)">FORTIS</text>

    <line x1="298" y1="162" x2="360" y2="162"
          stroke="#1E6A53" stroke-width="1.2" opacity="0.9"/>

    <text x="372" y="168"
          font-family="'Inter','DM Sans','Helvetica Neue',system-ui,sans-serif"
          font-weight="500" font-size="15"
          letter-spacing="6.2"
          fill="#C9A84C" opacity="0.92">WEALTH MANAGEMENT</text>
  </g>
</svg>
